<svg width="480" height="440" viewBox="0 0 480 440" fill="none"
     xmlns="http://www.w3.org/2000/svg" role="img"
     aria-labelledby="hero-blueprint-title">
  <title id="hero-blueprint-title">Blueprint: scattered data sources condensed into one trusted system that keeps working over time.</title>

  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#009B8F" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="5" refY="4" orient="auto">
      <path d="M0 1 L6 4 L0 7" fill="none" stroke="#009B8F" stroke-width="1.4"
            stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="478" height="438" rx="10" fill="#FFFFFF"/>
  <rect x="1" y="1" width="478" height="438" rx="10" fill="url(#grid)"/>
  <rect x="1.5" y="1.5" width="477" height="437" rx="9.5" fill="none"
        stroke="#E5E7EB" stroke-width="1"/>

  <text x="28" y="42" font-family="Inter, system-ui, sans-serif" font-size="11"
        letter-spacing="2.4" font-weight="600" fill="#009B8F">SCATTERED</text>
  <text x="207" y="42" font-family="Inter, system-ui, sans-serif" font-size="11"
        letter-spacing="2.4" font-weight="600" fill="#656D76">CONDENSED</text>
  <text x="372" y="42" font-family="Inter, system-ui, sans-serif" font-size="11"
        letter-spacing="2.4" font-weight="600" fill="#1F2328">TRUSTED</text>

  <g stroke="#1F2328" stroke-width="1.4">
    <g transform="rotate(-4 78 96)">
      <rect x="40" y="74" width="76" height="46" rx="5" fill="#FFFFFF"/>
      <line x1="50" y1="88" x2="96" y2="88" stroke="#9AA1A8" stroke-width="1.2"/>
      <line x1="50" y1="98" x2="106" y2="98" stroke="#9AA1A8" stroke-width="1.2"/>
      <line x1="50" y1="108" x2="88" y2="108" stroke="#9AA1A8" stroke-width="1.2"/>
    </g>
    <g transform="rotate(3 78 168)">
      <rect x="40" y="148" width="76" height="46" rx="5" fill="#FFFFFF"/>
      <line x1="50" y1="162" x2="100" y2="162" stroke="#9AA1A8" stroke-width="1.2"/>
      <line x1="50" y1="172" x2="92" y2="172" stroke="#9AA1A8" stroke-width="1.2"/>
      <line x1="50" y1="182" x2="104" y2="182" stroke="#9AA1A8" stroke-width="1.2"/>
    </g>
    <g transform="rotate(-2 78 240)">
      <rect x="40" y="220" width="76" height="46" rx="5" fill="#FFFFFF"/>
      <line x1="50" y1="234" x2="94" y2="234" stroke="#9AA1A8" stroke-width="1.2"/>
      <line x1="50" y1="244" x2="106" y2="244" stroke="#9AA1A8" stroke-width="1.2"/>
      <line x1="50" y1="254" x2="86" y2="254" stroke="#9AA1A8" stroke-width="1.2"/>
    </g>
  </g>
  <g font-family="Inter, system-ui, sans-serif" font-size="9.5" fill="#656D76" letter-spacing="0.3">
    <text x="40" y="135">spreadsheet</text>
    <text x="40" y="209">script / feed</text>
    <text x="40" y="281">prototype</text>
  </g>

  <g stroke="#009B8F" stroke-width="1.5" fill="none" stroke-linecap="round">
    <path d="M120 96  C 160 96, 168 170, 206 170"/>
    <path d="M120 170 L 206 170"/>
    <path d="M120 244 C 160 244, 168 170, 206 170"/>
  </g>

  <g>
    <circle cx="226" cy="170" r="20" fill="#FFFFFF" stroke="#009B8F" stroke-width="1.6"/>
    <path d="M217 170 L 223 177 L 236 162" fill="none" stroke="#009B8F"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g font-family="Inter, system-ui, sans-serif" font-size="9.5" fill="#1F2328" letter-spacing="0.4">
    <text x="226" y="118" text-anchor="middle">validate</text>
    <text x="226" y="218" text-anchor="middle">provenance</text>
  </g>
  <g fill="#009B8F">
    <circle cx="226" cy="128" r="1.6"/>
    <circle cx="226" cy="208" r="1.6"/>
  </g>

  <path d="M246 170 L 300 170" stroke="#009B8F" stroke-width="2"
        fill="none" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g>
    <rect x="312" y="118" width="128" height="104" rx="7"
          fill="#009B8F" fill-opacity="0.06" stroke="#009B8F" stroke-width="1.8"/>
    <rect x="326" y="136" width="100" height="20" rx="3" fill="#FFFFFF" stroke="#009B8F" stroke-width="1.2"/>
    <rect x="326" y="160" width="100" height="20" rx="3" fill="#FFFFFF" stroke="#009B8F" stroke-width="1.2"/>
    <rect x="326" y="184" width="100" height="20" rx="3" fill="#FFFFFF" stroke="#009B8F" stroke-width="1.2"/>
    <circle cx="416" cy="146" r="2.2" fill="#009B8F"/>
    <circle cx="416" cy="170" r="2.2" fill="#009B8F"/>
    <circle cx="416" cy="194" r="2.2" fill="#009B8F"/>
  </g>
  <text x="376" y="246" text-anchor="middle" font-family="Inter, system-ui, sans-serif"
        font-size="10" font-weight="600" letter-spacing="0.4" fill="#1F2328">one trusted system</text>

  <line x1="40" y1="372" x2="426" y2="372" stroke="#1F2328" stroke-width="1.4"
        marker-end="url(#arrow)" stroke-linecap="round"/>
  <g stroke="#9AA1A8" stroke-width="1.2">
    <line x1="64"  y1="368" x2="64"  y2="376"/>
    <line x1="154" y1="368" x2="154" y2="376"/>
    <line x1="244" y1="368" x2="244" y2="376"/>
    <line x1="334" y1="368" x2="334" y2="376"/>
  </g>
  <g stroke="#009B8F" stroke-width="1" stroke-dasharray="3 3" stroke-opacity="0.55">
    <line x1="312" y1="226" x2="312" y2="368"/>
    <line x1="440" y1="226" x2="440" y2="368"/>
  </g>
  <text x="40" y="398" font-family="Inter, system-ui, sans-serif" font-size="10"
        fill="#656D76" letter-spacing="0.3">handover</text>
  <text x="426" y="398" text-anchor="end" font-family="Inter, system-ui, sans-serif"
        font-size="10" font-weight="600" fill="#009B8F" letter-spacing="0.3">keeps working — for years</text>
</svg>
